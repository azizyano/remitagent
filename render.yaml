# Render.com deployment configuration
# Option 1: Using Python native runtime (may have build issues with pandas)
services:
  - type: web
    name: remitagent
    runtime: python
    plan: starter
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: python main.py --mode monitor
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        value: "8000"
      - key: CELO_RPC_URL
        sync: false
      - key: CELO_PRIVATE_KEY
        sync: false
      - key: CELO_WALLET_ADDRESS
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
    healthCheckPath: /health

