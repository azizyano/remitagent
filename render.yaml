# Render.com deployment configuration using Docker
# This avoids Python 3.14 and build issues with pydantic/pandas
services:
  - type: web
    name: remitagent
    runtime: docker
    plan: starter
    envVars:
      - key: PORT
        value: "8000"
      - key: CELO_RPC_URL
        sync: false
      - key: CELO_PRIVATE_KEY
        sync: false
      - key: CELO_WALLET_ADDRESS
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
    healthCheckPath: /health
