# Render.com deployment configuration
# Uses Docker with Python 3.11 to avoid Python 3.14 build issues
services:
  - type: web
    name: remitagent
    runtime: docker
    plan: starter
    envVars:
      - key: PORT
        value: "8000"
      - key: CELO_RPC_URL
        sync: false
      - key: CELO_PRIVATE_KEY
        sync: false
      - key: CELO_WALLET_ADDRESS
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
    healthCheckPath: /health
